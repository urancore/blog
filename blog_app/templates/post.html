{% extends "base.html" %}

{% block title %}My Page Title{% endblock %}

{% block content %}
<div class="post-container">
	<h4 class="author"><a href="/user/{{ post.autor.username }}">autor: {{ post.autor.username }}</a></h4>
	<h1>{{ post.title }}</h1>
	<p>{{ post.content }}</p>
	<p class="created-at">Create: {{ post.created_at }}</p>
</div>
{% endblock %}
